<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover"
  >
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
  <meta name="theme-color" content="#0E0E10">
  <title>Gronk's Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Bungee&family=Barlow+Condensed:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
      --sal: env(safe-area-inset-left);
      --sar: env(safe-area-inset-right);
    }
    canvas {
      display: block;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    #portrait-msg {
      display: none;
      position: fixed;
      inset: 0;
      background: #0E0E10;
      color: #F4ECD8;
      font-family: "Alfa Slab One", "Rockwell", Impact, serif;
      letter-spacing: 0.02em;
      font-size: 5vw;
      text-align: center;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 1em;
      z-index: 10;
      pointer-events: none;
    }
    #portrait-msg span { font-size: 10vw; }
    @media (orientation: portrait) and (max-aspect-ratio: 3/4) {
      #portrait-msg { display: flex; }
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="portrait-msg">
    <span>&#8635;</span>
    Rotate for best experience!
  </div>
  <script src="assets.js"></script>
  <script src="enemy_assets.js"></script>
  <script src="audio_assets.js"></script>
  <script src="game.js"></script>
</body>
</html>
